<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
  .container { max-width: 600px; margin: 40px auto; background: #fff; padding: 32px; border-radius: 8px; }
  h1 { color: #2d3748; }
  p { color: #4a5568; line-height: 1.6; }
  .message-box { background: #f7fafc; border: 1px solid #e2e8f0; padding: 16px; border-radius: 4px; margin: 16px 0; }
  .footer { margin-top: 32px; font-size: 12px; color: #a0aec0; }
</style>
</head>
<body>
  <div class="container">
    <h1>Notification</h1>
    <p>Hi {{ name }},</p>
    <div class="message-box">
      <p>{{ message }}</p>
    </div>
    <div class="footer">You received this notification from our system.</div>
  </div>
</body>
</html>
