<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
  .container { max-width: 600px; margin: 40px auto; background: #fff; padding: 32px; border-radius: 8px; }
  h1 { color: #2d3748; }
  p { color: #4a5568; line-height: 1.6; }
  .btn { display: inline-block; margin-top: 16px; padding: 12px 24px; background: #4299e1; color: #fff; text-decoration: none; border-radius: 4px; }
  .footer { margin-top: 32px; font-size: 12px; color: #a0aec0; }
</style>
</head>
<body>
  <div class="container">
    <h1>Password Reset</h1>
    <p>Hi {{ name }},</p>
    <p>We received a request to reset your password. Click the button below to proceed.</p>
    <a class="btn" href="{{ reset_link }}">Reset Password</a>
    <p>If you didn't request a reset, ignore this email.</p>
    <div class="footer">This link expires in 24 hours.</div>
  </div>
</body>
</html>
