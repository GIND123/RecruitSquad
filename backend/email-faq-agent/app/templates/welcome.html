<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
  .container { max-width: 600px; margin: 40px auto; background: #fff; padding: 32px; border-radius: 8px; }
  h1 { color: #2d3748; }
  p { color: #4a5568; line-height: 1.6; }
  .footer { margin-top: 32px; font-size: 12px; color: #a0aec0; }
</style>
</head>
<body>
  <div class="container">
    <h1>Welcome, {{ name }}!</h1>
    <p>Your account has been created with <strong>{{ email }}</strong>.</p>
    <p>We're excited to have you on board. Get started by exploring what we have to offer.</p>
    <div class="footer">You received this email because you signed up.</div>
  </div>
</body>
</html>
