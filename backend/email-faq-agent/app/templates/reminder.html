<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
  .container { max-width: 600px; margin: 40px auto; background: #fff; padding: 32px; border-radius: 8px; }
  h1 { color: #2d3748; }
  p { color: #4a5568; line-height: 1.6; }
  .reminder-box { background: #ebf8ff; border-left: 4px solid #4299e1; padding: 16px; margin: 16px 0; }
  .footer { margin-top: 32px; font-size: 12px; color: #a0aec0; }
</style>
</head>
<body>
  <div class="container">
    <h1>Reminder</h1>
    <p>Hi {{ name }},</p>
    <div class="reminder-box">
      <p>{{ reminder_text }}</p>
    </div>
    <p>Due date: <strong>{{ due_date }}</strong></p>
    <div class="footer">This is an automated reminder.</div>
  </div>
</body>
</html>
